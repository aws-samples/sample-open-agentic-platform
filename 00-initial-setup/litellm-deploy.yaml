apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: kagent
  labels:
    app: litellm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: litellm
  template:
    metadata:
      labels:
        app: litellm
    spec:
      volumes:
        - name: config-volume
          configMap:
            name: litellm-config
            defaultMode: 420
      containers:
        - name: litellm-app
          image: ghcr.io/berriai/litellm:main-stable
          args:
            - '--port'
            - '4000'
            - '--config'
            - /app/config/config.yaml
          ports:
            - containerPort: 4000
              protocol: TCP
          env:
            - name: AWS_REGION_NAME
              value: us-west-2
          volumeMounts:
            - name: config-volume
              mountPath: /app/config
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: IfNotPresent
      restartPolicy: Always
      serviceAccountName: litellm
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600
---
apiVersion: v1
kind: Service
metadata:
  name: litellm-service
  namespace: kagent
spec:
  ports:
    - protocol: TCP
      port: 4000
      targetPort: 4000
  selector:
    app: litellm
  type: ClusterIP