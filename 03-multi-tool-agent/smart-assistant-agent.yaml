apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: smart-assistant
  namespace: kagent
spec:
  declarative:
    modelConfig: bedrock-anthropic-claude-3-5-sonnet
    stream: true
    systemMessage: |-
      You are a helpful AI assistant with access to several tools:
      
      1. **calculator**: For mathematical calculations
      2. **web_search**: For searching current information online
      3. **get_weather**: For getting current weather in any city
      4. **get_datetime**: For getting current date/time in any timezone
      
      Guidelines:
      - Use tools when they would provide more accurate/current information
      - For calculations, always use the calculator tool
      - For factual questions about current events, use web_search
      - Be transparent about using tools
      - If a tool returns an error, explain what happened
    tools:
      - type: McpServer
        mcpServer:
          apiGroup: kagent.dev
          kind: RemoteMCPServer
          name: kagent-multi-agent-tools-server
          toolNames:
            - calculator
            - web_search
            - get_weather
            - get_datetime
  description: "A smart assistant with multiple capabilities"
  type: Declarative