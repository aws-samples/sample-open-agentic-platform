apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-langfuse-datasource
  namespace: monitoring
data:
  langfuse-datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Langfuse
        type: postgres
        url: langfuse-postgres.langfuse.svc.cluster.local:5432
        database: langfuse
        user: langfuse
        secureJsonData:
          password: langfuse_password
        jsonData:
          sslmode: disable
          postgresVersion: 1500
        editable: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-agent-dashboards
  namespace: monitoring
data:
  agent-overview.json: |
    {
      "dashboard": {
        "title": "Kagent Agent Overview",
        "panels": [
          {
            "title": "LLM Requests per Agent",
            "targets": [{
              "expr": "sum(rate(agent_llm_requests_total[5m])) by (agent)",
              "legendFormat": "{{agent}}"
            }]
          },
          {
            "title": "Tool Calls per Agent",
            "targets": [{
              "expr": "sum(rate(agent_tool_calls_total[5m])) by (agent, tool)",
              "legendFormat": "{{agent}}/{{tool}}"
            }]
          },
          {
            "title": "P50 Latency by Agent",
            "targets": [{
              "expr": "histogram_quantile(0.5, rate(agent_llm_duration_seconds_bucket[5m])) by (agent)",
              "legendFormat": "{{agent}}"
            }]
          },
          {
            "title": "Error Rate",
            "targets": [{
              "expr": "rate(agent_requests_total{status=~\"5..\"}[5m]) / rate(agent_requests_total[5m])",
              "legendFormat": "{{agent}}"
            }]
          }
        ]
      }
    }
  
  langfuse-costs.json: |
    {
      "dashboard": {
        "title": "Langfuse - Agent Costs",
        "panels": [
          {
            "title": "Cost per Agent (24h)",
            "type": "table",
            "datasource": "Langfuse",
            "targets": [{
              "rawSql": "SELECT name as agent, SUM(total_cost) as cost, COUNT(*) as requests FROM traces WHERE timestamp > NOW() - INTERVAL '24 hours' GROUP BY name ORDER BY cost DESC"
            }]
          },
          {
            "title": "Token Usage Over Time",
            "type": "timeseries",
            "datasource": "Langfuse",
            "targets": [{
              "rawSql": "SELECT timestamp, name as agent, SUM(input_tokens + output_tokens) as tokens FROM traces WHERE timestamp > NOW() - INTERVAL '24 hours' GROUP BY timestamp, name"
            }]
          },
          {
            "title": "Cost Breakdown by Model",
            "type": "piechart",
            "datasource": "Langfuse",
            "targets": [{
              "rawSql": "SELECT model, SUM(total_cost) as cost FROM traces WHERE timestamp > NOW() - INTERVAL '24 hours' GROUP BY model"
            }]
          }
        ]
      }
    }
  
  langfuse-tools.json: |
    {
      "dashboard": {
        "title": "Langfuse - Tool Usage",
        "panels": [
          {
            "title": "Tool Call Frequency",
            "type": "table",
            "datasource": "Langfuse",
            "targets": [{
              "rawSql": "SELECT tool_name, agent_name, COUNT(*) as calls, AVG(duration_ms) as avg_duration FROM tool_calls WHERE timestamp > NOW() - INTERVAL '24 hours' GROUP BY tool_name, agent_name ORDER BY calls DESC"
            }]
          },
          {
            "title": "Tool Latency Distribution",
            "type": "histogram",
            "datasource": "Langfuse",
            "targets": [{
              "rawSql": "SELECT tool_name, duration_ms FROM tool_calls WHERE timestamp > NOW() - INTERVAL '1 hour'"
            }]
          }
        ]
      }
    }
  
  a2a-patterns.json: |
    {
      "dashboard": {
        "title": "Agent-to-Agent Patterns",
        "panels": [
          {
            "title": "A2A Call Graph",
            "type": "nodeGraph",
            "datasource": "Langfuse",
            "targets": [{
              "rawSql": "SELECT source_agent, target_agent, COUNT(*) as weight FROM agent_calls WHERE timestamp > NOW() - INTERVAL '24 hours' GROUP BY source_agent, target_agent"
            }]
          },
          {
            "title": "A2A Call Latency",
            "type": "timeseries",
            "datasource": "Langfuse",
            "targets": [{
              "rawSql": "SELECT timestamp, source_agent, target_agent, AVG(duration_ms) as latency FROM agent_calls WHERE timestamp > NOW() - INTERVAL '24 hours' GROUP BY timestamp, source_agent, target_agent"
            }]
          }
        ]
      }
    }
