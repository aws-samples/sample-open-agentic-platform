apiVersion: apps/v1
kind: Deployment
metadata:
  name: langfuse
  namespace: langfuse
spec:
  replicas: 2
  selector:
    matchLabels:
      app: langfuse
  template:
    metadata:
      labels:
        app: langfuse
    spec:
      initContainers:
        # Wait for postgres to be ready
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z langfuse-postgres 5432; do
                echo "Waiting for postgres..."
                sleep 2
              done
      containers:
        - name: langfuse
          image: langfuse/langfuse:2
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: langfuse-secrets
                  key: DATABASE_URL
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: langfuse-secrets
                  key: NEXTAUTH_SECRET
            - name: SALT
              valueFrom:
                secretKeyRef:
                  name: langfuse-secrets
                  key: SALT
            - name: LANGFUSE_INIT_USER_EMAIL
              valueFrom:
                secretKeyRef:
                  name: langfuse-secrets
                  key: LANGFUSE_INIT_USER_EMAIL
            - name: LANGFUSE_INIT_USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: langfuse-secrets
                  key: LANGFUSE_INIT_USER_PASSWORD
            - name: LANGFUSE_INIT_PROJECT_NAME
              valueFrom:
                secretKeyRef:
                  name: langfuse-secrets
                  key: LANGFUSE_INIT_PROJECT_NAME
            - name: NEXTAUTH_URL
              valueFrom:
                configMapKeyRef:
                  name: langfuse-config
                  key: NEXTAUTH_URL
            - name: TELEMETRY_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: langfuse-config
                  key: TELEMETRY_ENABLED
            - name: LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES
              valueFrom:
                configMapKeyRef:
                  name: langfuse-config
                  key: LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: langfuse-config
                  key: NODE_ENV
            - name: HOSTNAME
              value: "0.0.0.0"
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 4Gi
          livenessProbe:
            httpGet:
              path: /api/public/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/public/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: langfuse
  namespace: langfuse
spec:
  selector:
    app: langfuse
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
