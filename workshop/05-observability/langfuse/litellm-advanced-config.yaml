apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: kagent
data:
  config.yaml: |-
    model_list:
      # Primary model
      - model_name: bedrock-claude-3-5-sonnet
        litellm_params:
          model: bedrock/anthropic.claude-3-5-sonnet-20240620-v1:0
          aws_region_name: os.environ/AWS_REGION_NAME
      
      # Fallback model (cheaper/faster)
      - model_name: bedrock-claude-3-haiku
        litellm_params:
          model: bedrock/anthropic.claude-3-haiku-20240307-v1:0
          aws_region_name: os.environ/AWS_REGION_NAME
    
    router_settings:
      # Load balancing
      routing_strategy: simple-shuffle  # Options: simple-shuffle, least-busy, usage-based-routing
      
      # Fallbacks
      fallbacks:
        - bedrock-claude-3-5-sonnet: [bedrock-claude-3-haiku]
      
      # Retry logic
      num_retries: 2
      retry_after: 5
      timeout: 600
      
      # Allowed failures before fallback
      allowed_fails: 3
    
    litellm_settings:
      # Request timeout
      request_timeout: 600
      
      # Langfuse integration
      success_callback: ["langfuse"]
      failure_callback: ["langfuse"]
      callbacks: ["langfuse"]
      
      # Rate limiting (requests per minute)
      rpm_limit: 100  # Global limit
      tpm_limit: 100000  # Tokens per minute
      
      # Caching (requires Redis)
      cache: true
      cache_params:
        type: redis
        host: redis.kagent.svc.cluster.local
        port: 6379
        ttl: 3600  # 1 hour cache
      
      # Cost tracking
      max_budget: 100  # USD per month
      budget_duration: 30d
      
      # Drop unmapped params (for compatibility)
      drop_params: true
