apiVersion: kagent.dev/v1alpha2
kind: RemoteMCPServer
metadata:
  name: kagent-multi-agent-tools-server
  namespace: kagent
spec:
  description: Multi-tool MCP server providing calculator, web search, weather, and datetime tools
  protocol: STREAMABLE_HTTP
  url: http://kagent-multi-agent-tools-server.kagent.svc.cluster.local:8080/mcp
  timeout: 30s
