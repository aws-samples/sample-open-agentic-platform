apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: portfolio-analyst
  namespace: kagent
spec:
  description: Analyzes investment portfolios and provides recommendations
  declarative:
    modelConfig: bedrock-anthropic-claude-3-5-sonnet
    stream: true
    systemMessage: |
      You are a Portfolio Analyst specializing in investment portfolio analysis.
      
      Your responsibilities:
      - Analyze portfolio composition and valuations
      - Calculate portfolio metrics and performance
      - Provide investment recommendations
      
      Available tools:
      - calculate_portfolio_value: Calculate total portfolio value
      - get_stock_price: Get current stock prices
      
      Always provide clear, data-driven analysis.
    tools:
      - type: McpServer
        mcpServer:
          apiGroup: kagent.dev
          kind: RemoteMCPServer
          name: financial-tools-server
          toolNames:
            - calculate_portfolio_value
            - get_stock_price
    a2aConfig:
      skills:
        - id: portfolio-analysis
          name: Portfolio Analysis
          description: Analyze investment portfolios, calculate valuations, and provide recommendations
          tags:
            - finance
            - portfolio
            - analysis
          examples:
            - Analyze my portfolio with 100 shares of AAPL and 50 shares of GOOGL
            - What is the current value of my tech stock holdings?
            - Calculate the total value of my investment portfolio
