apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agent-platform-addons
  namespace: argocd
spec:
  project: default
  sources:
    - ref: values
      repoURL: "${REPO_URL}"
      targetRevision: "${REVISION}"
    - repoURL: "${REPO_URL}"
      path: "${BASEPATH}charts/application-sets"
      targetRevision: "${REVISION}"
      helm:
        releaseName: agent-platform-addons
        ignoreMissingValueFiles: true
        valueFiles:
          - "$values/${BASEPATH}bootstrap/default/addons.yaml"
          - "$values/${BASEPATH}environments/control-plane/addons.yaml"
        valuesObject:
          useSelectors: false
          globalSelectors:
            enable_agent_platform: "true"
          repoURLGit: "${REPO_URL}"
          repoURLGitRevision: "${REVISION}"
          repoURLGitBasePath: "${BASEPATH}"
  destination:
    namespace: argocd
    name: ${HUB_CLUSTER_NAME}
  syncPolicy:
    automated:
      selfHeal: true
      allowEmpty: true
      prune: true
    retry:
      limit: 100
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
