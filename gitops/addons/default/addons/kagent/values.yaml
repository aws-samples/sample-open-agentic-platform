# Disable the argo-rollouts subchart: kagent v0.7.9 ships an Agent CR with
# spec.declarative.deployment unset, which fails CRD validation:
#   spec.declarative.deployment: Invalid value: "null": must be of type object
# Tracking upstream fix in kagent-dev/kagent. Re-enable once a release ships
# the deployment field populated (or the schema relaxes its requirement).
#
# Subchart condition lives at top-level per Chart.yaml
# (condition: argo-rollouts-agent.enabled), not under agents.* — kagent's own
# values.yaml only uses agents.* for resources, not the dependency toggle.
argo-rollouts-agent:
  enabled: false

# Override default model config to use Bedrock via LiteLLM proxy
providers:
  default: openAI
  openAI:
    provider: OpenAI
    model: bedrock-claude-3-5-sonnet
    apiKeySecretRef: kagent-openai
    apiKeySecretKey: OPENAI_API_KEY
    config:
      baseUrl: http://litellm-service.kagent.svc.cluster.local:4000

otel:
  tracing:
    enabled: true
    exporter:
      otlp:
        endpoint: http://otel-collector.otel.svc.cluster.local:4317
