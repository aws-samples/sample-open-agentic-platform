apiVersion: v1
kind: Secret
metadata:
  name: kagent-openai
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  # LiteLLM uses Pod Identity for Bedrock auth, not API keys.
  # This dummy value satisfies the kagent agent framework which requires
  # a non-empty Authorization header for OpenAI-compatible endpoints.
  OPENAI_API_KEY: "sk-bedrock-pod-identity"
---
apiVersion: kagent.dev/v1alpha2
kind: ModelConfig
metadata:
  name: bedrock-anthropic-claude-3-5-sonnet
  namespace: {{ .Release.Namespace }}
spec:
  apiKeySecret: kagent-openai
  apiKeySecretKey: OPENAI_API_KEY
  model: bedrock-claude-3-5-sonnet
  openAI:
    baseUrl: http://litellm-service.{{ .Release.Namespace }}.svc.cluster.local:4000
  provider: OpenAI
