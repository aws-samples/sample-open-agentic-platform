global:
  awsRegion: us-west-2

image:
  repository: ghcr.io/berriai/litellm
  tag: main-stable
  pullPolicy: IfNotPresent

replicas: 1

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

settings:
  requestTimeout: 600
  rpmLimit: 100
  tpmLimit: 100000
  cache: false
