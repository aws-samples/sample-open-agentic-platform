global:
  awsRegion: us-west-2
  eksClusterName: dev
  projectName: agent-core
  networkMode: PUBLIC
  terraformRepoUrl: ""
  terraformRepoRevision: main

capabilities:
  memory: true
  browser: true
  codeInterpreter: true

mcpServer:
  image:
    repository: ""
    tag: latest
    pullPolicy: Always
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"

kagent:
  enabled: true
  modelConfig: bedrock-anthropic-claude-3-5-sonnet
