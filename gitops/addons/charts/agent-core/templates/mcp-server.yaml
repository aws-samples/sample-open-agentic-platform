{{- if .Values.mcpServer.image.repository }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "agent-core.name" . }}-mcp-sa
  namespace: {{ include "agent-core.namespace" . }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    {{- include "agent-core.labels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: agent-core-mcp-{{ include "agent-core.name" . }}
  namespace: {{ include "agent-core.namespace" . }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    {{- include "agent-core.labels" . | nindent 4 }}
spec:
  selector:
    app: agent-core-mcp-{{ include "agent-core.name" . }}
  ports:
    - port: 8080
      targetPort: 8080
      name: mcp
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-core-mcp-{{ include "agent-core.name" . }}
  namespace: {{ include "agent-core.namespace" . }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    {{- include "agent-core.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-core-mcp-{{ include "agent-core.name" . }}
  template:
    metadata:
      labels:
        app: agent-core-mcp-{{ include "agent-core.name" . }}
    spec:
      serviceAccountName: {{ include "agent-core.name" . }}-mcp-sa
      containers:
        - name: mcp-server
          image: {{ .Values.mcpServer.image.repository }}:{{ .Values.mcpServer.image.tag }}
          imagePullPolicy: {{ .Values.mcpServer.image.pullPolicy }}
          ports:
            - containerPort: 8080
              name: mcp
          env:
            - name: AWS_REGION
              value: {{ .Values.global.awsRegion }}
            - name: MEMORY_ID
              valueFrom:
                secretKeyRef:
                  name: agent-core-outputs-{{ include "agent-core.name" . }}
                  key: memory_id
            - name: BROWSER_ID
              valueFrom:
                secretKeyRef:
                  name: agent-core-outputs-{{ include "agent-core.name" . }}
                  key: browser_id
            - name: CODE_INTERPRETER_ID
              valueFrom:
                secretKeyRef:
                  name: agent-core-outputs-{{ include "agent-core.name" . }}
                  key: code_interpreter_id
          resources:
            {{- toYaml .Values.mcpServer.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
{{- end }}
