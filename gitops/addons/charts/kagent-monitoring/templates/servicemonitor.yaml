apiVersion: v1
kind: Service
metadata:
  name: kagent-controller-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    app: kagent-controller
spec:
  ports:
    - name: metrics
      port: 8443
      targetPort: 8443
      protocol: TCP
  selector:
    control-plane: controller-manager
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: kagent-controller
  namespace: {{ .Release.Namespace }}
  labels:
    app: kagent-controller
spec:
  selector:
    matchLabels:
      app: kagent-controller
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics
      scheme: https
      tlsConfig:
        insecureSkipVerify: true
      bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
