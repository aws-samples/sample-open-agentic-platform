{{- if .Values.capabilities.memory }}
apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xagentcorememories.agentplatform.aws.example.com
  annotations:
spec:
  group: agentplatform.aws.example.com
  names:
    kind: XAgentCoreMemory
    plural: xagentcorememories
  claimNames:
    kind: AgentCoreMemory
    plural: agentcorememories
  connectionSecretKeys:
    - id
    - arn
    - name
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                parameters:
                  type: object
                  properties:
                    region:
                      type: string
                    name:
                      type: string
                    description:
                      type: string
                    eventExpiryDuration:
                      type: integer
                      default: 30
                    tags:
                      type: object
                      additionalProperties:
                        type: string
                  required: [region, name]
              required: [parameters]
            status:
              type: object
              properties:
                id:
                  type: string
                arn:
                  type: string
---
{{- end }}
{{- if .Values.capabilities.browser }}
apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
