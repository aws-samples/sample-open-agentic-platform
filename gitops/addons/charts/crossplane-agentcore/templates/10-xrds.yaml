  annotations:
spec:
  group: agentplatform.aws.example.com
  names:
    kind: XAgentCoreBrowser
    plural: xagentcorebrowsers
  claimNames:
    kind: AgentCoreBrowser
    plural: agentcorebrowsers
  connectionSecretKeys:
