    - arn
    - name
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                parameters:
                  type: object
                  properties:
                    region:
                      type: string
                    name:
                      type: string
                    description:
                      type: string
                    networkMode:
                      type: string
                      enum: [PUBLIC, SANDBOX]
                      default: PUBLIC
                    tags:
                      type: object
                      additionalProperties:
                        type: string
                  required: [region, name]
              required: [parameters]
            status:
              type: object
              properties:
                id:
                  type: string
                arn:
                  type: string
---
{{- end }}
