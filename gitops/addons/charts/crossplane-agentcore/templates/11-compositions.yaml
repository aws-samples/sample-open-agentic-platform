{{- if .Values.capabilities.memory }}
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: agentcore-memory.agentplatform.aws.example.com
  labels:
    provider: aws
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  compositeTypeRef:
    apiVersion: agentplatform.aws.example.com/v1alpha1
    kind: XAgentCoreMemory
  writeConnectionSecretsToNamespace: crossplane-system
  mode: Pipeline
  pipeline:
    - step: patch-and-transform
      functionRef:
        name: function-patch-and-transform
      input:
        apiVersion: pt.fn.crossplane.io/v1beta1
        kind: Resources
        resources:
          - name: memory
            base:
              apiVersion: bedrockagentcore.aws.upbound.io/v1beta1
              kind: Memory
              spec:
                forProvider:
                  eventExpiryDuration: 30
                providerConfigRef:
                  name: agentcore
                deletionPolicy: Delete
            patches:
              - fromFieldPath: spec.parameters.region
                toFieldPath: spec.forProvider.region
              - fromFieldPath: spec.parameters.name
                toFieldPath: spec.forProvider.name
              - fromFieldPath: spec.parameters.description
                toFieldPath: spec.forProvider.description
              - fromFieldPath: spec.parameters.eventExpiryDuration
                toFieldPath: spec.forProvider.eventExpiryDuration
              - fromFieldPath: spec.parameters.tags
                toFieldPath: spec.forProvider.tags
              - type: ToCompositeFieldPath
                fromFieldPath: status.atProvider.id
                toFieldPath: status.id
              - type: ToCompositeFieldPath
                fromFieldPath: status.atProvider.arn
                toFieldPath: status.arn
            connectionDetails:
              - name: id
                type: FromFieldPath
                fromFieldPath: status.atProvider.id
              - name: arn
                type: FromFieldPath
                fromFieldPath: status.atProvider.arn
              - name: name
                type: FromFieldPath
                fromFieldPath: status.atProvider.name
---
{{- end }}
