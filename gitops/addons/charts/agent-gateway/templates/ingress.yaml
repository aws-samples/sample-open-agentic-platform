{{- if .Values.ingress.enabled }}
---
# Separate ClusterIP service for ALB ingress routing.
# The agentgateway-proxy service is a LoadBalancer (NLB) managed by the
# Gateway API controller. This service targets the same pods but allows
# the ALB to create IP-mode target groups without conflict.
apiVersion: v1
kind: Service
metadata:
  name: agentgateway-ingress
  namespace: agentgateway-system
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: agentgateway-proxy
    app.kubernetes.io/instance: agentgateway-proxy
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agentgateway
  namespace: agentgateway-system
  annotations:
    alb.ingress.kubernetes.io/target-type: ip
    {{- $tls := .Values.ingress.tls }}
    {{- if kindIs "invalid" $tls }}{{- $tls = true }}{{- end }}
    {{- if kindIs "string" $tls }}{{- $tls = ne (lower $tls) "false" }}{{- end }}
    {{- if $tls }}
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    {{- else }}
    # TLS terminated upstream (e.g. CloudFront in `cloudfront-alb` exposure
    # mode). ALB listens plaintext HTTP only.
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
    {{- end }}
    alb.ingress.kubernetes.io/load-balancer-attributes: idle_timeout.timeout_seconds=300
    argocd.argoproj.io/sync-wave: "10"
spec:
  ingressClassName: {{ .Values.ingress.className | default "platform" }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /sse
            pathType: Prefix
            backend:
              service:
                name: agentgateway-ingress
                port:
                  number: 8080
          - path: /.well-known/oauth-protected-resource
            pathType: Prefix
            backend:
              service:
                name: agentgateway-ingress
                port:
                  number: 8080
{{- end }}
