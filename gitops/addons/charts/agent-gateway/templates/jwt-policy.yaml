{{- $issuerUrl := .Values.global.keycloak.issuerUrl -}}
{{- $realm := .Values.global.keycloak.realm -}}
{{- $jwksPath := printf "/realms/%s/protocol/openid-connect/certs" $realm -}}
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: jwt-auth-policy
  namespace: agentgateway-system
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: agentgateway-proxy
  traffic:
    jwtAuthentication:
      mode: {{ .Values.jwtAuth.mode }}
      providers:
      - issuer: {{ $issuerUrl | quote }}
        jwks:
          remote:
            jwksPath: {{ $jwksPath | quote }}
            cacheDuration: {{ .Values.jwtAuth.cacheDuration | quote }}
            backendRef:
              group: ""
              kind: Service
              name: {{ .Values.global.keycloak.serviceName }}
              namespace: {{ .Values.global.keycloak.namespace }}
              port: {{ .Values.global.keycloak.servicePort }}
    authorization:
      action: Allow
      policy:
        matchExpressions:
        - {{ .Values.jwtAuth.allowExpression | quote }}
