apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mcp-servers-route
  namespace: {{ .Values.mcpBackend.namespace }}
spec:
  parentRefs:
  - name: agentgateway-proxy
    namespace: agentgateway-system
  rules:
  - backendRefs:
    - name: mcp-servers-backend
      group: agentgateway.dev
      kind: AgentgatewayBackend
    matches:
    - path:
        type: PathPrefix
        value: /sse
    - path:
        type: PathPrefix
        value: /.well-known/oauth-protected-resource/mcp
    - path:
        type: PathPrefix
        value: /.well-known/oauth-authorization-server/mcp
    - path:
        type: PathPrefix
        value: /{{ trimPrefix "/" .Values.global.keycloak.pathPrefix }}/realms/{{ .Values.global.keycloak.realm }}/protocol/openid-connect/certs
