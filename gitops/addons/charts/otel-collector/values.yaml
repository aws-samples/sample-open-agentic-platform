global:
  awsRegion: us-east-1

collector:
  image: public.ecr.aws/aws-observability/aws-otel-collector:v0.43.1
  replicas: 1
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi

# Jaeger in-cluster endpoint for dual export
jaeger:
  enabled: true
  endpoint: "jaeger-collector.jaeger.svc.cluster.local:4317"

# X-Ray export (uses Pod Identity for auth)
xray:
  enabled: true
