apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-collector
  namespace: {{ .Release.Namespace }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: {{ .Release.Namespace }}
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch:
        timeout: 30s
        send_batch_size: 8192
      memory_limiter:
        check_interval: 5s
        limit_mib: 400
        spike_limit_mib: 100

    extensions:
      health_check:
        endpoint: 0.0.0.0:13133

    exporters:
      {{- if .Values.xray.enabled }}
      awsxray:
        region: {{ .Values.global.awsRegion }}
      {{- end }}
      {{- if .Values.jaeger.enabled }}
      otlp/jaeger:
        endpoint: {{ .Values.jaeger.endpoint }}
        tls:
          insecure: true
      {{- end }}

    service:
      extensions: [health_check]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters:
            {{- if .Values.xray.enabled }}
            - awsxray
            {{- end }}
            {{- if .Values.jaeger.enabled }}
            - otlp/jaeger
            {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: {{ .Release.Namespace }}
  labels:
    app: otel-collector
spec:
  replicas: {{ .Values.collector.replicas }}
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      serviceAccountName: otel-collector
      containers:
        - name: collector
          image: {{ .Values.collector.image }}
          args:
            - '--config=/conf/config.yaml'
          ports:
            - containerPort: 4317
              name: otlp-grpc
              protocol: TCP
            - containerPort: 4318
              name: otlp-http
              protocol: TCP
          env:
            - name: AWS_REGION
              value: {{ .Values.global.awsRegion }}
          volumeMounts:
            - name: config
              mountPath: /conf
          resources:
            {{- toYaml .Values.collector.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 10
            periodSeconds: 15
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP
  type: ClusterIP
