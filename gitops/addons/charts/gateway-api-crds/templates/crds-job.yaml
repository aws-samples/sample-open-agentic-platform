{{/*
  Gateway API CRDs installer.
  Uses a one-shot Job with cluster-admin to apply the official Gateway API
  standard-install.yaml from the kubernetes-sigs release.
  Deployed at sync-wave 7, before agentgateway controller at wave 8.
*/}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gateway-api-installer
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: gateway-api-installer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
- kind: ServiceAccount
  name: gateway-api-installer
  namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: gateway-api-crds-install
  namespace: {{ .Release.Namespace }}
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    spec:
      serviceAccountName: gateway-api-installer
      restartPolicy: Never
      containers:
      - name: install
        image: bitnami/kubectl:latest
        command:
        - /bin/sh
        - -c
        - |
          kubectl apply --server-side --force-conflicts -f \
            https://github.com/kubernetes-sigs/gateway-api/releases/download/v{{ .Values.gatewayApiVersion | default "1.5.0" }}/standard-install.yaml
          echo "Gateway API CRDs installed successfully"
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            memory: 128Mi
