{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: langfuse
  namespace: {{ .Release.Namespace }}
  annotations:
    alb.ingress.kubernetes.io/target-type: ip
    {{- if .Values.ingress.name }}
    alb.ingress.kubernetes.io/load-balancer-name: {{ .Values.ingress.name }}
    {{- end }}
    {{- $tls := .Values.ingress.tls }}
    {{- if kindIs "invalid" $tls }}{{- $tls = true }}{{- end }}
    {{- if kindIs "string" $tls }}{{- $tls = ne (lower $tls) "false" }}{{- end }}
    {{- if $tls }}
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    {{- else }}
    # TLS terminated upstream (e.g. CloudFront in `cloudfront-alb` exposure
    # mode). ALB listens plaintext HTTP only.
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
    {{- end }}
    alb.ingress.kubernetes.io/healthcheck-path: /api/public/health
    alb.ingress.kubernetes.io/order: "100"
    argocd.argoproj.io/sync-wave: "10"
spec:
  ingressClassName: {{ .Values.ingress.className | default "platform" }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: langfuse
                port:
                  number: 3000
{{- end }}
