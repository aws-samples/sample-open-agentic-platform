{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: langfuse
  namespace: {{ .Release.Namespace }}
  annotations:
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/healthcheck-path: /api/public/health
    alb.ingress.kubernetes.io/actions.url-rewrite: '{"type":"forward","forwardConfig":{"targetGroups":[{"serviceName":"langfuse","servicePort":"3000"}]}}'
    alb.ingress.kubernetes.io/conditions.url-rewrite: '[{"field":"path-pattern","pathPatternConfig":{"values":["/langfuse","/langfuse/*"]}}]'
    argocd.argoproj.io/sync-wave: "10"
spec:
  ingressClassName: {{ .Values.ingress.className | default "platform" }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /langfuse
            pathType: Prefix
            backend:
              service:
                name: langfuse
                port:
                  number: 3000
{{- end }}
