apiVersion: v1
kind: Secret
metadata:
  name: langfuse-secrets
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  DATABASE_URL: "postgresql://langfuse:langfuse-password@langfuse-postgres:5432/langfuse"
  NEXTAUTH_SECRET: "changeme-generate-random-secret"
  SALT: "changeme-generate-salt"
  LANGFUSE_INIT_USER_EMAIL: "admin@agent-platform.local"
  LANGFUSE_INIT_USER_PASSWORD: "changeme-admin-password"
  LANGFUSE_INIT_PROJECT_NAME: "agent-platform"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: langfuse-config
  namespace: {{ .Release.Namespace }}
data:
  NEXTAUTH_URL: "https://{{ .Values.ingress.host }}"
  TELEMETRY_ENABLED: "false"
  LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "true"
  NODE_ENV: "production"
  AUTH_KEYCLOAK_CLIENT_ID: "langfuse"
  AUTH_KEYCLOAK_ISSUER: "{{ .Values.keycloak.issuerUrl }}"
  AUTH_KEYCLOAK_ALLOW_ACCOUNT_LINKING: "true"
  AUTH_DISABLE_SIGNUP: "{{ .Values.keycloak.disableSignup | default "false" }}"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: langfuse-postgres
  namespace: {{ .Release.Namespace }}
spec:
  serviceName: langfuse-postgres
  replicas: 1
  # Set fields explicitly that the apiserver would otherwise default, so Argo
  # does not see drift on every reconcile.
  podManagementPolicy: OrderedReady
  revisionHistoryLimit: 10
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 0
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  selector:
    matchLabels:
      app: langfuse-postgres
  template:
    metadata:
      labels:
        app: langfuse-postgres
    spec:
      # Pin pod-spec fields the apiserver would otherwise default, so Argo
      # does not see drift on every reconcile.
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      terminationGracePeriodSeconds: 30
      securityContext: {}
      containers:
        - name: postgres
          image: {{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}
          imagePullPolicy: IfNotPresent
          # Pin defaulted container fields too.
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          ports:
            - containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_DB
              value: langfuse
            - name: POSTGRES_USER
              value: langfuse
            - name: POSTGRES_PASSWORD
              value: langfuse-password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
  volumeClaimTemplates:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        # Pin volumeMode so it matches the apiserver-defaulted live state.
        volumeMode: Filesystem
        resources:
          requests:
            storage: {{ .Values.postgres.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: langfuse-postgres
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: langfuse-postgres
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: langfuse
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: langfuse
  template:
    metadata:
      labels:
        app: langfuse
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z langfuse-postgres 5432; do echo "Waiting for postgres..."; sleep 2; done']
      containers:
        - name: langfuse
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: langfuse-secrets
            - configMapRef:
                name: langfuse-config
          env:
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: AUTH_KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: langfuse-keycloak-secret
                  key: LANGFUSE_CLIENT_SECRET
                  optional: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /api/public/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/public/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: langfuse
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: langfuse
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: langfuse-keycloak-secret
  namespace: {{ .Release.Namespace }}
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  refreshInterval: "5m"
  target:
    name: langfuse-keycloak-secret
    creationPolicy: Owner
  data:
    - secretKey: LANGFUSE_CLIENT_SECRET
      remoteRef:
        key: {{ .Values.keycloak.secretManagerKey | default "hub/keycloak-clients" }}
        property: LANGFUSE_CLIENT_SECRET
