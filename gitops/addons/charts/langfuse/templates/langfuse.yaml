apiVersion: v1
kind: Secret
metadata:
  name: langfuse-secrets
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  DATABASE_URL: "postgresql://langfuse:langfuse-password@langfuse-postgres:5432/langfuse"
  NEXTAUTH_SECRET: "changeme-generate-random-secret"
  SALT: "changeme-generate-salt"
  LANGFUSE_INIT_USER_EMAIL: "admin@agent-platform.local"
  LANGFUSE_INIT_USER_PASSWORD: "changeme-admin-password"
  LANGFUSE_INIT_PROJECT_NAME: "agent-platform"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: langfuse-config
  namespace: {{ .Release.Namespace }}
data:
  NEXTAUTH_URL: "http://langfuse.{{ .Release.Namespace }}.svc.cluster.local:3000"
  TELEMETRY_ENABLED: "false"
  LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "true"
  NODE_ENV: "production"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: langfuse-postgres
  namespace: {{ .Release.Namespace }}
spec:
  serviceName: langfuse-postgres
  replicas: 1
  selector:
    matchLabels:
      app: langfuse-postgres
  template:
    metadata:
      labels:
        app: langfuse-postgres
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: langfuse
            - name: POSTGRES_USER
              value: langfuse
            - name: POSTGRES_PASSWORD
              value: langfuse-password
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.postgres.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: langfuse-postgres
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: langfuse-postgres
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: langfuse
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: langfuse
  template:
    metadata:
      labels:
        app: langfuse
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z langfuse-postgres 5432; do echo "Waiting for postgres..."; sleep 2; done']
      containers:
        - name: langfuse
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: langfuse-secrets
            - configMapRef:
                name: langfuse-config
          env:
            - name: HOSTNAME
              value: "0.0.0.0"
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /api/public/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/public/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: langfuse
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: langfuse
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
