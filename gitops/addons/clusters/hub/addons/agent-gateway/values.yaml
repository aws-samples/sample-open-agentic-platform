# Override MCP backend protocol to StreamableHTTP.
# The agent-core-mcp proxy image exposes a JSON-RPC POST endpoint at /mcp
# (StreamableHTTP), not an SSE stream. SSE is the default in the chart but
# only works with servers that expose a persistent event stream.
mcpBackend:
  targets:
    - name: code
      host: execute-code-mcp-v1.agent-core-infra.svc.cluster.local
      port: 8080
      protocol: StreamableHTTP
    - name: browser
      host: browser-mcp-v1.agent-core-infra.svc.cluster.local
      port: 8080
      protocol: StreamableHTTP
    - name: memory
      host: memory-mcp-v1.agent-core-infra.svc.cluster.local
      port: 8080
      protocol: StreamableHTTP
