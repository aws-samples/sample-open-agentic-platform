syncPolicy:
  automated:
    selfHeal: true
    allowEmpty: true
    prune: true
  retry:
    limit: -1
    backoff:
      duration: 5s
      factor: 2
      maxDuration: 10m
  syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
syncPolicyAppSet:
  preserveResourcesOnDeletion: false
useSelectors: true
repoURLGit: '{{default "https://github.com/aws-samples/sample-agent-platform-on-eks.git" .metadata.annotations.addons_repo_url}}'
repoURLGitRevision: '{{default "main" .metadata.annotations.addons_repo_revision}}'
repoURLGitBasePath: '{{default "gitops/addons/" .metadata.annotations.addons_repo_basepath}}'

valueFiles:
  - default/addons
  - environments/{{.metadata.labels.environment}}/addons
  - clusters/{{.nameNormalized}}/addons
useValuesFilePrefix: true
valuesFilePrefix: 'tenants/{{.metadata.labels.tenant}}/'

########################################
# KAgent Operator
########################################

kagent-crds:
  enabled: false
  namespace: kagent
  chartName: kagent-crds
  defaultVersion: '0.7.9'
  chartNamespace: kagent-dev/kagent/helm
  chartRepository: ghcr.io
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: '2'
  selector:
    matchExpressions:
      - key: enable_kagent
        operator: In
        values: ['true']
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /metadata/annotations

kagent:
  enabled: false
  namespace: kagent
  chartName: kagent
  defaultVersion: '0.7.9'
  chartNamespace: kagent-dev/kagent/helm
  chartRepository: ghcr.io
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: '3'
  selector:
    matchExpressions:
      - key: enable_kagent
        operator: In
        values: ['true']

########################################
# Observability — LLM Gateway
########################################

litellm:
  enabled: false
  namespace: kagent
  defaultVersion: '0.1.0'
  path: 'gitops/addons/charts/litellm'
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: '3'
  selector:
    matchExpressions:
      - key: enable_litellm
        operator: In
        values: ['true']
  valuesObject:
    global:
      awsRegion: '{{.metadata.annotations.aws_region}}'

########################################
# Observability — Tracing & Metrics
########################################

langfuse:
  enabled: false
  namespace: langfuse
  defaultVersion: '0.1.0'
  path: 'gitops/addons/charts/langfuse'
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: '5'
  selector:
    matchExpressions:
      - key: enable_langfuse
        operator: In
        values: ['true']

jaeger:
  enabled: false
  namespace: jaeger
  chartName: jaeger
  defaultVersion: '3.4.1'
  chartRepository: 'https://jaegertracing.github.io/helm-charts'
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: '5'
  selector:
    matchExpressions:
      - key: enable_jaeger
        operator: In
        values: ['true']
  valuesObject:
    provisionDataStore:
      cassandra: false
    allInOne:
      enabled: true
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 512Mi
    storage:
      type: memory
    agent:
      enabled: false
    collector:
      enabled: false
    query:
      enabled: false

kagent-monitoring:
  enabled: false
  namespace: kagent
  defaultVersion: '0.2.0'
  path: 'gitops/addons/charts/kagent-monitoring'
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: '6'
  selector:
    matchExpressions:
      - key: enable_kagent_monitoring
        operator: In
        values: ['true']

prometheus-operator-crds:
  enabled: false
  namespace: kagent
  chartName: prometheus-operator-crds
  defaultVersion: '28.0.1'
  chartRepository: 'https://prometheus-community.github.io/helm-charts'
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: '5'
  selector:
    matchExpressions:
      - key: enable_kagent_monitoring
        operator: In
        values: ['true']
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /metadata/annotations

########################################
# KAgent Setup (ModelConfig + Bedrock)
########################################

kagent-setup:
  enabled: false
  namespace: kagent
  defaultVersion: '0.1.0'
  path: 'gitops/addons/charts/kagent-setup'
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: '3'
  selector:
    matchExpressions:
      - key: enable_kagent
        operator: In
        values: ['true']

########################################
# AgentCore — Crossplane Compositions
########################################

crossplane-agentcore:
  enabled: false
  namespace: crossplane-system
  defaultVersion: '0.1.0'
  path: 'gitops/addons/charts/crossplane-agentcore'
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: '4'
  selector:
    matchExpressions:
      - key: enable_agent_core
        operator: In
        values: ['true']
  valuesObject:
    global:
      awsRegion: '{{.metadata.annotations.aws_region}}'
      eksClusterName: '{{.metadata.annotations.aws_cluster_name}}'
      projectName: '{{default "agent-core" (index .metadata.annotations "agent_core_project_name")}}'
      networkMode: '{{default "PUBLIC" (index .metadata.annotations "agent_core_network_mode")}}'
  ignoreDifferences:
    - group: apiextensions.crossplane.io
      kind: Composition
      jsonPointers:
        - /spec/mode
        - /spec/publishConnectionDetailsWithStoreConfigRef
      jqPathExpressions:
        - .spec.resources[].readinessChecks
        - .spec.resources[].patches[].type
    - group: apiextensions.crossplane.io
      kind: CompositeResourceDefinition
      jsonPointers:
        - /metadata/annotations

########################################
# AgentGateway — MCP Auth Gateway
########################################

gateway-api-crds:
  enabled: false
  namespace: agentgateway-system
  defaultVersion: '0.1.0'
  path: 'gitops/addons/charts/gateway-api-crds'
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: '7'
  selector:
    matchExpressions:
      - key: enable_agent_gateway
        operator: In
        values: ['true']
  valuesObject:
    gatewayApiVersion: "1.5.0"

agentgateway-crds:
  enabled: false
  namespace: agentgateway-system
  chartName: agentgateway-crds
  defaultVersion: 'v1.1.0'
  chartRepository: 'cr.agentgateway.dev'
  chartNamespace: charts
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: '7'
  selector:
    matchExpressions:
      - key: enable_agent_gateway
        operator: In
        values: ['true']
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /metadata/annotations

agentgateway:
  enabled: false
  namespace: agentgateway-system
  chartName: agentgateway
  defaultVersion: 'v1.1.0'
  chartRepository: 'cr.agentgateway.dev'
  chartNamespace: charts
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: '8'
  selector:
    matchExpressions:
      - key: enable_agent_gateway
        operator: In
        values: ['true']
  valuesObject:
    controller:
      extraEnv:
        KGW_ENABLE_GATEWAY_API_EXPERIMENTAL_FEATURES: "true"

agent-gateway:
  enabled: false
  namespace: agent-core-infra
  defaultVersion: '0.1.0'
  path: 'gitops/addons/charts/agent-gateway'
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: '9'
  selector:
    matchExpressions:
      - key: enable_agent_gateway
        operator: In
        values: ['true']
  valuesObject:
    global:
      keycloak:
        issuerUrl: '{{default (printf "https://%s/keycloak/realms/platform" (index .metadata.annotations "ingress_domain_name")) (index .metadata.annotations "keycloak_issuer_url")}}'
        serviceName: '{{default "keycloak" (index .metadata.annotations "keycloak_service_name")}}'
        namespace: '{{default "keycloak" (index .metadata.annotations "keycloak_namespace")}}'
    mcpAuth:
      resourceMetadata:
        resource: '{{default "http://agentgateway-proxy.agentgateway-system.svc.cluster.local:8080/sse" (index .metadata.annotations "agent_gateway_resource_url")}}'
