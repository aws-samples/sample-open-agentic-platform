apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: bedrock-assistant
  namespace: kagent
spec:
  description: "A helpful assistant powered by AWS Bedrock Claude"
  declarative:
    modelConfig: bedrock-anthropic-claude-3-5-sonnet
    stream: true
  
    # System prompt
    systemMessage: |
      You are a helpful AI assistant running on Kubernetes.
      You provide clear, concise, and accurate responses.
      Always be polite and professional.