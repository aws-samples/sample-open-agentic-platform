apiVersion: v1
kind: Namespace
metadata:
  name: langfuse
---
apiVersion: v1
kind: Secret
metadata:
  name: langfuse-secrets
  namespace: langfuse
type: Opaque
stringData:
  # Database credentials
  DATABASE_URL: "postgresql://langfuse:langfuse_password@langfuse-postgres:5432/langfuse"
  
  # Langfuse auth
  NEXTAUTH_SECRET: "changeme-generate-random-secret-here"  # Generate with: openssl rand -base64 32
  SALT: "changeme-generate-salt-here"  # Generate with: openssl rand -base64 32
  
  # Initial admin credentials
  LANGFUSE_INIT_USER_EMAIL: "admin@kagent.local"
  LANGFUSE_INIT_USER_PASSWORD: "changeme-admin-password"
  
  # API keys (will be generated on first login, but can pre-configure)
  LANGFUSE_INIT_PROJECT_NAME: "kagent-agents"
  LANGFUSE_INIT_PROJECT_PUBLIC_KEY: "pk-lf-kagent-$(openssl rand -hex 16)"
  LANGFUSE_INIT_PROJECT_SECRET_KEY: "sk-lf-kagent-$(openssl rand -hex 32)"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: langfuse-config
  namespace: langfuse
data:
  NEXTAUTH_URL: "http://langfuse.langfuse.svc.cluster.local:3000"
  TELEMETRY_ENABLED: "false"
  LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "true"
  NODE_ENV: "production"
