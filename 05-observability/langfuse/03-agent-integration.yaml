apiVersion: v1
kind: ConfigMap
metadata:
  name: langfuse-litellm-config
  namespace: kagent
data:
  # Langfuse connection for LiteLLM
  LANGFUSE_HOST: "http://langfuse.langfuse.svc.cluster.local:3000"
  LANGFUSE_PUBLIC_KEY: ""  # Will be set from secret
  LANGFUSE_SECRET_KEY: ""  # Will be set from secret
---
apiVersion: v1
kind: Secret
metadata:
  name: langfuse-agent-keys
  namespace: kagent
type: Opaque
stringData:
  # These will be generated after Langfuse first login
  # Login to Langfuse UI, create project, copy keys here
  LANGFUSE_PUBLIC_KEY: "pk-lf-..."  # Get from Langfuse UI after setup
  LANGFUSE_SECRET_KEY: "sk-lf-..."  # Get from Langfuse UI after setup
---
apiVersion: batch/v1
kind: Job
metadata:
  name: langfuse-setup-keys
  namespace: kagent
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: setup
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              echo "Langfuse Setup Instructions:"
              echo "============================"
              echo ""
              echo "1. Access Langfuse UI:"
              echo "   kubectl port-forward -n langfuse svc/langfuse 3000:3000"
              echo "   Open: http://localhost:3000"
              echo ""
              echo "2. Login with:"
              echo "   Email: admin@kagent.local"
              echo "   Password: (from langfuse-secrets)"
              echo ""
              echo "3. Create/View Project 'kagent-agents'"
              echo ""
              echo "4. Copy API Keys from Settings"
              echo ""
              echo "5. Update secret:"
              echo "   kubectl edit secret langfuse-agent-keys -n kagent"
              echo ""
              echo "6. Add keys:"
              echo "   LANGFUSE_PUBLIC_KEY: pk-lf-..."
              echo "   LANGFUSE_SECRET_KEY: sk-lf-..."
              echo ""
              echo "7. Restart agents to pick up keys:"
              echo "   kubectl rollout restart deployment -n kagent -l app.kubernetes.io/part-of=kagent"
