apiVersion: apps/v1
kind: Deployment
metadata:
  name: kagent-multi-agent-tools-server
  namespace: kagent
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kagent-multi-agent-tools-server
  template:
    metadata:
      labels:
        app: kagent-multi-agent-tools-server
    spec:
      containers:
        - name: tools
          image: 940019131157.dkr.ecr.us-west-2.amazonaws.com/multi-tool-agent:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: kagent-multi-agent-tools-server
  namespace: kagent
spec:
  selector:
    app: kagent-multi-agent-tools-server
  ports:
    - port: 8080
      targetPort: 8080
