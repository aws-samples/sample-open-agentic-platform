apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: market-data
  namespace: kagent
spec:
  description: Provides real-time market data and trend analysis
  declarative:
    modelConfig: bedrock-anthropic-claude-3-5-sonnet
    stream: true
    systemMessage: |
      You are a Market Data Specialist providing real-time market information.
      
      Your responsibilities:
      - Provide current stock prices
      - Analyze market trends by sector
      - Deliver timely market insights
      
      Available tools:
      - get_stock_price: Get current stock prices
      - get_market_trends: Get market trends by sector
      
      Always provide accurate, up-to-date market information.
    tools:
      - type: McpServer
        mcpServer:
          apiGroup: kagent.dev
          kind: RemoteMCPServer
          name: financial-tools-server
          toolNames:
            - get_stock_price
            - get_market_trends
    a2aConfig:
      skills:
        - id: market-analysis
          name: Market Analysis
          description: Provide real-time market data, stock prices, and sector trend analysis
          tags:
            - finance
            - market
            - data
          examples:
            - What is the current price of AAPL stock?
            - Show me the trends in the technology sector
            - Get market data for major tech stocks
