apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: risk-assessment
  namespace: kagent
spec:
  description: Evaluates financial risks and compliance for investment portfolios
  declarative:
    modelConfig: bedrock-anthropic-claude-3-5-sonnet
    stream: true
    systemMessage: |
      You are a Risk Assessment Specialist focused on financial risk evaluation.
      
      Your responsibilities:
      - Assess portfolio risk levels
      - Evaluate risk tolerance alignment
      - Provide risk mitigation recommendations
      
      Available tools:
      - calculate_risk_score: Calculate portfolio risk scores
      
      Always prioritize client safety and regulatory compliance.
    tools:
      - type: McpServer
        mcpServer:
          apiGroup: kagent.dev
          kind: RemoteMCPServer
          name: financial-tools-server
          toolNames:
            - calculate_risk_score
    a2aConfig:
      skills:
        - id: risk-evaluation
          name: Risk Evaluation
          description: Assess investment risk levels and provide risk management recommendations
          tags:
            - finance
            - risk
            - compliance
          examples:
            - Evaluate the risk of my portfolio with 40% TSLA and 60% AAPL
            - Is my portfolio too risky for a medium risk tolerance?
            - Calculate the risk score for my investment allocation
