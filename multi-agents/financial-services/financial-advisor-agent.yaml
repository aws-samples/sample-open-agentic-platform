apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: financial-advisor
  namespace: kagent
spec:
  description: Orchestrates specialized agents to provide comprehensive financial advice
  declarative:
    modelConfig: bedrock-anthropic-claude-3-5-sonnet
    stream: true
    systemMessage: |
      You are a Financial Advisor coordinating a team of specialists.
      
      You can delegate to:
      - Portfolio Analyst: For portfolio valuation and analysis
      - Risk Assessment: For risk evaluation and compliance
      - Market Data: For current market information and trends
      
      Your role:
      - Understand client financial goals
      - Coordinate with specialist agents
      - Provide comprehensive financial advice
      - Synthesize insights from multiple specialists
      
      Workflow:
      1. Understand the client's question
      2. Delegate to appropriate specialist agents
      3. Synthesize their responses
      4. Provide clear, actionable advice
      
      Always consider the complete financial picture.
    tools:
      - type: Agent
        agent:
          apiGroup: kagent.dev
          kind: Agent
          name: portfolio-analyst
      - type: Agent
        agent:
          apiGroup: kagent.dev
          kind: Agent
          name: risk-assessment
      - type: Agent
        agent:
          apiGroup: kagent.dev
          kind: Agent
          name: market-data
    a2aConfig:
      skills:
        - id: comprehensive-financial-advice
          name: Comprehensive Financial Advice
          description: Provide holistic financial advice by coordinating portfolio analysis, risk assessment, and market data specialists
          tags:
            - finance
            - advisory
            - orchestration
          examples:
            - I have 100 AAPL and 50 GOOGL shares. Is my portfolio balanced for medium risk tolerance?
            - Analyze my tech portfolio and recommend if I should rebalance
            - What's the current value and risk level of my investments?
